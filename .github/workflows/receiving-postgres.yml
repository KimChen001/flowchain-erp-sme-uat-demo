name: Receiving PostgreSQL Workbench

on:
  push:
    branches: [main, 'codex/**', 'release/**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flowchain_ci
          POSTGRES_PASSWORD: flowchain_ci_password
          POSTGRES_DB: flowchain_ci_diagnostics
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U flowchain_ci -d flowchain_ci_diagnostics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://generate_only:generate_only@127.0.0.1:55432/flowchain_generate_only?schema=public
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://flowchain_ci:flowchain_ci_password@127.0.0.1:55432/flowchain_ci_diagnostics?schema=public
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - run: npm run test:db:receiving
      - run: npm run test:api:receiving
      - run: npm run test:db:outbound
      - run: npm run test:api:outbound
      - run: npm run test:db:inventory-operations
      - run: npm run test:api:inventory-operations
      - run: npm run test:db:returns-quarantine
      - run: npm run test:api:returns-quarantine
      - run: npm run test:db:operational-finance
      - run: npm run test:api:operational-finance
      - run: npm run test:api:settings
      - run: npm run test:db:authorization
      - run: npm run test:api:authorization
      - run: npm run test:db:internal-settlement
      - run: npm run test:api:internal-settlement
      - run: npm run test:db:settlement-workflow-mobile
      - run: npm run test:api:mobile-sync
      - run: npm run test:db:mobile-authority-hardening
      - run: npm run test:api:mobile-sync-authorization
      - run: npm run test:api:mobile-po-approval
      - run: npm run test:api:mobile-po-db-authority
      - run: npm run test:api:mobile-receiving
      - run: npm run test:api:attachment-durability
      - run: npm run test:db:phase-5-2c1-controls
      - run: npm run test:api:mobile-sync-controls
      - run: npm run test:db:po-command-atomicity
      - run: npm run test:db:upgrade-v0-5-2b-to-v0-5-2c
      - run: npm run test:integration:attachment-restart
      - run: npm run attachment:health-check
        env:
          NODE_ENV: test
          FLOWCHAIN_ATTACHMENT_STORAGE_PROVIDER: local
          FLOWCHAIN_UPLOAD_STORAGE_DIR: /tmp/flowchain-ci-attachment-diagnostics
      - run: npm run attachment:orphan-check
        env:
          DATABASE_URL: postgresql://flowchain_ci:flowchain_ci_password@127.0.0.1:55432/flowchain_ci_diagnostics?schema=public
          FLOWCHAIN_PERSISTENCE_MODE: database
          NODE_ENV: test
          FLOWCHAIN_ATTACHMENT_STORAGE_PROVIDER: local
          FLOWCHAIN_UPLOAD_STORAGE_DIR: /tmp/flowchain-ci-attachment-diagnostics
      - run: npm run test:ops:attachment-diagnostics
      - run: npm run test:api:receiving-decimal-parity
      - run: npm run pilot:check
        env:
          FLOWCHAIN_PERSISTENCE_MODE: database
          DATABASE_URL: postgresql://readiness_only:readiness_only@127.0.0.1:55432/flowchain_readiness_only?schema=public
          FLOWCHAIN_LOCAL_SESSION_SECRET: ci-readiness-check-secret-at-least-32-characters
          FLOWCHAIN_DEFAULT_TENANT_ID: ci-readiness-tenant
          FLOWCHAIN_ENABLE_DB_RECEIVING_POSTING: 'true'
          FLOWCHAIN_ENABLE_DB_OUTBOUND_POSTING: 'true'
          FLOWCHAIN_ENABLE_DB_INVENTORY_OPERATIONS: 'true'
          FLOWCHAIN_ENABLE_DB_OPERATIONAL_FINANCE: 'true'
          FLOWCHAIN_ENABLE_DB_INTERNAL_SETTLEMENT: 'true'
          FLOWCHAIN_ENABLE_DB_SETTLEMENT_WORKFLOW: 'true'
          FLOWCHAIN_ENABLE_DB_MOBILE_SYNC: 'true'
          FLOWCHAIN_ENABLE_DB_MOBILE_OPERATIONS: 'true'
          FLOWCHAIN_SYNC_CURSOR_SECRET: ci-mobile-sync-cursor-secret-at-least-32-characters
          FLOWCHAIN_ALLOW_LOCAL_ACTOR_BOOTSTRAP: 'false'

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://generate_only:generate_only@127.0.0.1:55432/flowchain_generate_only?schema=public
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser:receiving
      - run: npm run test:browser:reports
      - run: npm run test:browser:outbound
      - run: npm run test:browser:inventory-operations
      - run: npm run test:browser:returns-quarantine
      - run: npm run test:browser:settings
      - run: npm run test:browser:operational-finance
      - run: npm run test:browser:authorization
      - run: npm run test:browser:internal-settlement
      - run: npm run test:browser:settlement-workflow
      - run: npm run test:browser:mobile-operations
      - run: npm run test:browser:mobile-authority
      - run: npm run test:browser:mobile-sync-controls
      - run: npm run test:browser:bank-reconciliation
